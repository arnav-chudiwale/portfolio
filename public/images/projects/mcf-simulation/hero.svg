<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0A1628"/>
  <defs>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8A951" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g2)"/>
  
  <!-- Queue visualization -->
  <rect x="60" y="160" width="200" height="180" rx="8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="160" y="150" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="sans-serif" letter-spacing="0.1em">PENDING QUEUE</text>
  
  <!-- Queue items -->
  <rect x="80" y="180" width="160" height="24" rx="4" fill="#C8A951" opacity="0.3"/>
  <text x="160" y="196" text-anchor="middle" fill="#C8A951" font-size="10" font-family="sans-serif">BATCH — 64 units</text>
  <rect x="80" y="212" width="160" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="160" y="228" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="sans-serif">RT — 2 units</text>
  <rect x="80" y="244" width="160" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="160" y="260" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="sans-serif">MEDIUM — 8 units</text>
  <rect x="80" y="276" width="160" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="160" y="292" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="sans-serif">BATCH — 32 units</text>
  <rect x="80" y="308" width="160" height="24" rx="4" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Scheduler -->
  <rect x="320" y="200" width="160" height="100" rx="8" fill="none" stroke="#C8A951" stroke-width="2" opacity="0.6"/>
  <text x="400" y="240" text-anchor="middle" fill="#C8A951" font-size="13" font-family="sans-serif" font-weight="700">SCHEDULER</text>
  <text x="400" y="260" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-family="sans-serif">FIFO | SJF | MCF</text>
  <text x="400" y="280" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="sans-serif">5-min epochs</text>
  
  <!-- Arrows -->
  <line x1="260" y1="250" x2="320" y2="250" stroke="#C8A951" stroke-width="1.5" opacity="0.4"/>
  <polygon points="316,246 324,250 316,254" fill="#C8A951" opacity="0.4"/>
  
  <line x1="480" y1="250" x2="540" y2="250" stroke="#C8A951" stroke-width="1.5" opacity="0.4"/>
  <polygon points="536,246 544,250 536,254" fill="#C8A951" opacity="0.4"/>
  
  <!-- GPU Cluster -->
  <rect x="540" y="140" width="200" height="220" rx="8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="640" y="130" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="12" font-family="sans-serif" letter-spacing="0.1em">GPU CLUSTER</text>
  
  <!-- GPU nodes grid -->
  <rect x="560" y="160" width="32" height="32" rx="4" fill="#C8A951" opacity="0.5"/>
  <rect x="600" y="160" width="32" height="32" rx="4" fill="#C8A951" opacity="0.3"/>
  <rect x="640" y="160" width="32" height="32" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="680" y="160" width="32" height="32" rx="4" fill="#C8A951" opacity="0.4"/>
  <rect x="560" y="200" width="32" height="32" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="600" y="200" width="32" height="32" rx="4" fill="#C8A951" opacity="0.2"/>
  <rect x="640" y="200" width="32" height="32" rx="4" fill="#C8A951" opacity="0.6"/>
  <rect x="680" y="200" width="32" height="32" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="560" y="240" width="32" height="32" rx="4" fill="#C8A951" opacity="0.35"/>
  <rect x="600" y="240" width="32" height="32" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="640" y="240" width="32" height="32" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="680" y="240" width="32" height="32" rx="4" fill="#C8A951" opacity="0.45"/>
  <rect x="560" y="280" width="32" height="32" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="600" y="280" width="32" height="32" rx="4" fill="#C8A951" opacity="0.25"/>
  <rect x="640" y="280" width="32" height="32" rx="4" fill="#C8A951" opacity="0.5"/>
  <rect x="680" y="280" width="32" height="32" rx="4" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Metrics at bottom -->
  <text x="160" y="410" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="sans-serif" letter-spacing="0.08em">GPU IDLE COST</text>
  <text x="340" y="410" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="sans-serif" letter-spacing="0.08em">SLA COMPLIANCE</text>
  <text x="520" y="410" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="sans-serif" letter-spacing="0.08em">FAIRNESS INDEX</text>
  <text x="680" y="410" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="sans-serif" letter-spacing="0.08em">UTILIZATION</text>
  
  <!-- Label -->
  <text x="400" y="470" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="13" font-family="sans-serif" letter-spacing="0.15em">DISCRETE-EVENT SIMULATION — POLICY EVALUATION</text>
</svg>
